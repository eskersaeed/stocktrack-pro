services:
  postgres:
    image: postgres:16
    container_name: stocktrack_postgres
    environment:
      POSTGRES_DB: stocktrackpro
      POSTGRES_USER: stocktrack
      POSTGRES_PASSWORD: stocktrack123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stocktrack_redis
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    container_name: stocktrack_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stocktrack.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: